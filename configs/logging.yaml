strategy:
  name: logging
  track: track1
data:
  same_day_news_policy: previous_day_only
signals:
  log_signal_values: true
portfolio:
  log_holdings: true
risk:
  log_constraints: true
execution:
  log_trades: true
llm:
  mode: "off"
  log_raw_outputs: false
logging:
  output_dir: .var/runs
  log_dir: .var/logs
  level: INFO
